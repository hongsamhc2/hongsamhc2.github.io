<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="fallingstar.js"></script> -->
    <title>Document</title>
</head>
<style>
    
    html,body{
        padding:0;
        margin:0;
        width:100%;
        height:100%;
        border: 0;
    }
    canvas{
        margin:0;
        padding:0;
    }

    .input-section{
        position:absolute;
        display:grid;
        grid-template-columns: 1fr 1fr;
    }
</style>
<body>
    <div class="input-section">
        <label for ="lineWidth">Line Width</label>
        <input id="lineWidth" type="range" max="25" min="0" step="5" value="3" >
        <label for ="gap">Point Gap</label>
        <input id="gap" type="range" max="1.9" min="0.1" step="0.1" value="0.5" >
        <label for ="speed">speed</label>
        <input id="speed" type="range" max="0.1" min="0.005" step="0.001" value="0.03" >
    </div>

    <canvas></canvas>    
    <script src="app.js"></script>
</body>

</html>

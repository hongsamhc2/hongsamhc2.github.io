    padding:1.2rem;

}

    width:calc(100% - 1.6rem);
    padding:0.8rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;

    box-shadow: 2px 2px 5px 1px rgba(0,0,0,0.3),-2px -2px 5px 1px rgba(250,250,250,0.3);

    width:120px;
    font-size:1.2rem;
    margin-bottom:8px;
}

.tn-form-item>input{
    font-size:1.2rem;
    border-radius: 4px;
    border:1px solid gray;
    background-color: white;

}
.tn-form-item>input:focus{
    outline:none;

}
.tn-form-item>input[type="text"]:hover{

}

}

    margin:0 0 3px 0;

.tn-form-item:nth-child(3)>select:focus{
    outline:none;
}
.tn-form-item:nth-child(6)>input{
    justify-self: start;
    flex-grow:0;
    height: 1.2rem;
    width:1.2rem
}
.tn-form-item:nth-child(7){
    justify-content: center;
}

    width: 100%;
    font-size: 1.2rem;
    display: flex;
    flex-wrap: wrap;
    gap:12px;
    margin-top: 10px;
}

    font-size:1.2rem;
    border:none;
    background-color: white;

    width:100%;
}
#tn-form-tag-set:focus{

}
.tn-form-tag-item{

.tn-form-tag-item>span{

    padding:10px 2px;
    border:none;
    border-radius:10px;
    background-color: rgb(73, 73, 223);
    color:white;

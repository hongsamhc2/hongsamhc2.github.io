<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=91a232c815b985a3c03bf9bee3c993a7&libraries=services"></script>

<style>
    html,body{
        width:100%;
        height:100%;
    }
    #map{
        margin:0;
        padding:0;
        width:100%;
        height:100%;
    }
</style>
<body>
    <div id="map"></div>
    <script>
		var container = document.getElementById('map');
		var options = {
			center: new kakao.maps.LatLng(33.450701, 126.570667),
			level: 6
		};

		var map = new kakao.maps.Map(container, options);

        var geocoder = new kakao.maps.services.Geocoder();



var circle = new kakao.maps.Circle({
    center : new kakao.maps.LatLng(33.450701, 126.570667),  // 원의 중심좌표 입니다 
    radius: 3000, // 미터 단위의 원의 반지름입니다 
    strokeWeight: 5, // 선의 두께입니다 
    strokeColor: '#75B8FA', // 선의 색깔입니다
    strokeOpacity: 1, // 선의 불투명도 입니다 1에서 0 사이의 값이며 0에 가까울수록 투명합니다
    strokeStyle: 'dashed', // 선의 스타일 입니다
    fillColor: '#CFE7FF', // 채우기 색깔입니다
    fillOpacity: 0.7  // 채우기 불투명도 입니다   
}); 

circle.setMap(map)
let addr_s = ''
getInfo(new kakao.maps.LatLng(33.450701, 126.570667))
function getInfo(coords,addr='제주특별자치도 제주시',radius=3000){
    const lat = coords.getLat() || 33.450701
    const lng = coords.getLng() || 126.570667
    const a = fetch('http://192.168.1.100:5000/api/evcharge/info',{
        method:'POST',
        body:JSON.stringify({coord:{'lat':lat,'lng':lng,'addr':addr,radius:radius}}),
        headers:{
            'Authorization':'alkcn122123qalkn3jnvjel34tj79g3sajsnck678',
            'Content-Type': 'application/json'
        }
    }).then(resp=>resp.json()).then(body=>setMarkers(body.data))
}


kakao.maps.event.addListener(map, 'click', function(e) {
    markers.map(marker=>marker.setMap(null))
    markers=[]
    circle.setPosition(e.latLng)
    circle.setMap(map)
    geocoder.coord2Address(e.latLng.getLng(), e.latLng.getLat(), (resp)=>{

        const addr = resp[0].address.address_name
        addr_s = addr
        getInfo(e.latLng,addr)

    })

})

function getLocation() {
    if (navigator.geolocation) { // GPS를 지원하면
      navigator.geolocation.getCurrentPosition(function(position) {
        alert(position.coords.latitude + ' ' + position.coords.longitude);
      }, function(error) {
        console.error(error);
      }, {
        enableHighAccuracy: false,
        maximumAge: 0,
        timeout: Infinity
      });
    } else {
      alert('GPS를 지원하지 않습니다');
    }
  }
  getLocation();

let markers = []
function setMarkers(data){

    for (var i = 0; i < data.length; i ++) {
    
        // 마커 이미지의 이미지 크기 입니다
        var imageSize = new kakao.maps.Size(24, 35); 
        
        // 마커 이미지를 생성합니다    
        
        // 마커를 생성합니다
        var marker = new kakao.maps.Marker({
            map: map, // 마커를 표시할 지도
            position: new kakao.maps.LatLng(data[i].lat, data[i].lng), // 마커를 표시할 위치
        });
        markers.push(marker)
    }
}
